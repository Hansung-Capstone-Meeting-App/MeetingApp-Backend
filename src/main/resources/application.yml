spring:
  application:
    name: demo

  devtools:
    restart:
      enabled: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}

  jpa:
    properties:
      hibernate:
        show_sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/api/oauth2/google/callback"
          notion:
            client-id: ${NOTION_CLIENT_ID}
            client-secret: ${NOTION_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: ${NOTION_SCOPE:read_user}
            redirect-uri: "{baseUrl}/api/oauth2/notion/callback"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          notion:
            authorization-uri: https://api.notion.com/v1/oauth/authorize
            token-uri: https://api.notion.com/v1/oauth/token
            user-info-uri: https://api.notion.com/v1/users/me
            notion-version: ${NOTION_VERSION:2022-06-28}

cloud:
  aws:
    s3:
      bucket: hansung-capstone-2026
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

ai:
  assemblyai:
    api-key: ${ASSEMBLYAI_API_KEY}
    base-url: https://api.assemblyai.com
  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com
    model: gemini-2.5-flash

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

slack:
  bot-token: ${SLACK_BOT_TOKEN}
  signing-secret: ${SLACK_SIGNING_SECRET}
