<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
<h4>회원가입 폼</h4>
<div id="error-message" style="color: red; display: none;"></div>
<div id="success-message" style="color: green; display: none;"></div>
<form id="register-form">
    <input id="displayName" type="text" placeholder="이름" required>
    <input id="email" type="email" placeholder="이메일" required>
    <input id="password" type="password" placeholder="비밀번호" required>
    <button type="submit">회원가입</button>
</form>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        try {
            const response = await fetch('/user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    displayName: document.getElementById('displayName').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            if (response.ok) {
                successDiv.textContent = '회원가입 성공';
                successDiv.style.display = 'block';
            } else {
                const error = await response.json();
                errorDiv.textContent = error.message || '회원가입 실패';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = '서버 오류가 발생했습니다';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
