<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원가입</title>
</head>
<body>

<h4>회원가입 화면</h4>

<div id="error-message" style="color: red; display: none;"></div>
<div id="success-message" style="color: green; display: none;"></div>

<form id="register-form">
    <input id="displayName" type="text" placeholder="이름" required>
    <input id="email" type="email" placeholder="이메일" required>
    <input id="password" type="password" placeholder="비밀번호 (최소 8자)" required>
    <input type="file" onchange="getURL(this)">
    <button type="submit">회원가입</button>
</form>

<img src="">

<script>
    let selectedFile = null; // 선택된 파일을 담을 변수

    //파일 선택 시 실행 (미리보기만 처리)
    function getURL(e) {
        selectedFile = e.files[0];
        if (selectedFile) {
            // 브라우저 메모리에서 임시 URL을 생성해 미리보기 표시
            const previewUrl = URL.createObjectURL(selectedFile);
            document.querySelector('img').src = previewUrl;
        }
    }

    //회원가입 버튼 클릭 시 실행
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        let finalImageUrl = null;

        try {
            // 이미지가 있다면 S3 업로드 먼저 진행
            if (selectedFile) {
                // Presigned URL 요청
                let name = encodeURIComponent(selectedFile.name);
                let presignedRes = await fetch('/presigned-url?filename=' + name);

                if (!presignedRes.ok) { //Presigned URL 발급 실패시
                    throw new Error("Presigned URL 발급 실패");
                }

                let presignedUrl = await presignedRes.text();

                // S3에 실제 파일 업로드 (PUT)
                let uploadRes = await fetch(presignedUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': selectedFile.type
                    },
                    body: selectedFile
                });

                if (uploadRes.ok) { //이미지 업로드가 잘 되었으면
                    finalImageUrl = uploadRes.url.split("?")[0]; //이미지 url 뽑기
                } else {
                    throw new Error('이미지 업로드에 실패했습니다.');
                }
            }

            // 서버로 회원가입 정보 전송
            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    displayName,
                    email,
                    password,
                    profileImageUrl: finalImageUrl // 위에서 얻은 S3 URL 전달
                })
            });

            if (response.ok) {
                const data = await response.json();
                successDiv.textContent = '회원가입 성공! 로그인 페이지로 이동합니다.';
                successDiv.style.display = 'block';

                // 2초 후 로그인 페이지로 이동
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const error = await response.json();

                // 필드별 에러 메시지 표시
                if (error.errors) {
                    const errorMessages = Object.values(error.errors).join(', ');
                    errorDiv.textContent = errorMessages;
                } else {
                    errorDiv.textContent = error.message || '회원가입 실패';
                }
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = '서버 오류가 발생했습니다';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
